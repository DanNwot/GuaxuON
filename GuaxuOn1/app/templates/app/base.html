{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuaxuOn - Gestão de Coleta Guaxupé</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="{% static 'app/css/style.css' %}">

    <style>
        /* Estilos críticos injetados para evitar "pulo" de layout */
        :root {
            --azul-prefeitura: #004a8d;
            --cinza-fundo: #f4f7f6;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--cinza-fundo);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main { flex: 1; }
        
        .navbar {
            background-color: var(--azul-prefeitura) !important;
            border-bottom: 3px solid #003366;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'index' %}">
                <i class="fas fa-truck-moving me-2"></i>GUAXUON
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link px-3" href="{% url 'index' %}">
                            <i class="fas fa-home me-1"></i> Início
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" href="{% url 'coleta_list' %}">
                            <i class="fas fa-calendar-alt me-1"></i> Horários de Coleta
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" href="/admin/" target="_blank">
                            <i class="fas fa-user-shield me-1"></i> Admin
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="py-4">
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <footer class="bg-white border-top py-4 mt-auto">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-start">
                    <p class="mb-0 text-muted">
                        &copy; 2026 <strong>GuaxuOn</strong> - Prefeitura Municipal de Guaxupé-MG
                    </p>
                </div>
                <div class="col-md-6 text-center text-md-end">
                    <small class="text-muted">Desenvolvido para uma cidade mais limpa</small>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'app/js/main.js' %}"></script>
</body>
</html>
