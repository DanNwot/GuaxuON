<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>GuaxuON - Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 320px; }
        h2 { text-align: center; color: #1a365d; margin-bottom: 20px; font-weight: bold; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #4a5568; font-weight: 600; }
        
        /* BORDAS DE DIGITAÇÃO COM BOLD (MAIS GROSSAS E VISÍVEIS) */
        .form-group input { 
            width: 100%; 
            padding: 10px; 
            box-sizing: border-box; 
            border: 2.5px solid #4a5568; /* Borda bem visível */
            border-radius: 6px; 
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        /* Efeito de foco azul ao clicar no campo */
        .form-group input:focus {
            border-color: #2b6cb0; 
        }

        /* BOTÃO AZUL PARA COMBINAR COM O SITE */
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #2b6cb0; /* Azul sólido principal */
            border: none; 
            color: white; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            margin-top: 10px; 
            transition: background-color 0.2s;
        }
        button:hover { 
            background-color: #1a365d; /* Azul mais escuro no hover */
        }

        .errorlist { color: #c53030; list-style: none; padding: 0; font-size: 14px; font-weight: bold; }
        
        .register-link { 
            text-align: center; 
            margin-top: 20px; 
            font-size: 14px; 
            color: #718096;
        }
        .register-link a { 
            color: #2b6cb0; 
            text-decoration: none; 
            font-weight: bold;
        }
        .register-link a:hover { 
            text-decoration: underline; 
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>GuaxuON</h2>
    
    {% if form.errors %}
        <p class="errorlist">Usuário ou senha incorretos. Tente novamente.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Usuário:</label>
            {{ form.username }}
        </div>
        <div class="form-group">
            <label for="id_password">Senha:</label>
            {{ form.password }}
        </div>
        <button type="submit">Entrar</button>
    </form>

    <div class="register-link">
        Não tem uma conta? <a href="{% url 'register' %}">Cadastre-se aqui</a>
    </div>
</div>

</body>
</html>
